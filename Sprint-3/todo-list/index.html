<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <form id="todo-form">
      <div id="input-container">
        <input type="text" id="new-to-do" placeholder="New to-do..." required />
        <button type="submit" id="submit">Add To-do</button>
        <button type="button" id="remove-all-completed">Remove all completed</button>
      </div>
    </form>

    <ul id="todo-list"></ul>

    <script src="script.js"></script>
  </body>
</html>
