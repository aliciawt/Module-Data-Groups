<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>Image carousel</title>
    <script defer src="slideshow.js"></script>
  </head>
  <body>
    <div id="carousel"></div>
    <div id="buttons-1">
      <button type="button" id="previous-btn">Previous</button>
      <button type="button" id="next-btn">Next</button>
    </div>
    <div id="buttons-2">
      <button type="button" id="auto-previous-btn">Auto-Previous</button>
      <button type="button" id="stop-btn">Stop</button>
      <button type="button" id="auto-next-btn">Auto-Next</button>
    </div>
  </body>
</html>
